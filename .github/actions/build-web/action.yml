name: Build web app
description: Set up Node.js, install dependencies, build dist-web, and smoke test the output.

inputs:
  node-version:
    description: Node.js version to use for the build.
    default: '26'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build web app
      shell: bash
      run: npm run build:web

    - name: Smoke test web app
      shell: bash
      run: test -s dist-web/index.html
