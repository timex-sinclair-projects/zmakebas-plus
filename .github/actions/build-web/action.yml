name: Build web app
description: Set up Node.js, install dependencies, build dist-web, and smoke test the output.

inputs:
  node-version:
    description: Node.js version to use for the build.
    default: '26'
  version:
    description: Optional version to expose through ZMAKEBAS_VERSION.
    default: ''

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v5
      with:
        node-version: ${{ inputs.node-version }}
        cache: npm

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Set build version
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if [[ -n "${INPUT_VERSION}" ]]; then
          echo "ZMAKEBAS_VERSION=${INPUT_VERSION}" >> "$GITHUB_ENV"
        elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          echo "ZMAKEBAS_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
        else
          echo "ZMAKEBAS_VERSION=0.0.0-dev" >> "$GITHUB_ENV"
        fi

    - name: Build web app
      shell: bash
      run: npm run build:web

    - name: Smoke test web app
      shell: bash
      run: test -s dist-web/index.html
