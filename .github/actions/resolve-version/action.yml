name: Resolve version
description: Resolve RELEASE_TAG and ZMAKEBAS_VERSION from a v-prefixed tag on the current commit.

inputs:
  tag:
    description: Optional v-prefixed version tag to use instead of resolving from the current ref.
    default: ''

runs:
  using: composite
  steps:
    - name: Resolve version tag
      shell: bash
      env:
        INPUT_TAG: ${{ inputs.tag }}
      run: |
        set -euo pipefail
        if [[ -n "${INPUT_TAG}" ]]; then
          tag="${INPUT_TAG}"
        elif [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
          tag="${GITHUB_REF_NAME}"
        else
          git fetch --force --tags
          tag="$(git tag --points-at HEAD --list 'v*' --sort=-v:refname | head -n 1)"
          if [[ -z "${tag}" ]]; then
            echo "Current commit $(git rev-parse --short HEAD) is not tagged with a v* version tag." >&2
            exit 1
          fi
        fi

        if [[ ! "${tag}" =~ ^v[0-9]+(\.[0-9]+)*([.-][0-9A-Za-z]+)*$ ]]; then
          echo "Version tag must look like v0.1.1, got '${tag}'." >&2
          exit 1
        fi

        echo "RELEASE_TAG=${tag}" >> "$GITHUB_ENV"
        echo "ZMAKEBAS_VERSION=${tag#v}" >> "$GITHUB_ENV"
